name: build-and-publish

on:
  workflow_dispatch:
  schedule:
    - cron: '10 6 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: digitalblackoutiran-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate site
        env:
          BOOTSTRAP_DEMO: '1'
          BOOTSTRAP_DAYS: '0'
          BACKFILL_MISSING_HISTORY: '1'
          NETBLOCKS_LATEST_URL: 'https://netblocks.org/reports/'
        run: |
          python scripts/build.py

      - name: Commit and push generated content
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/posts site

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: daily automated report"

          for i in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "Push succeeded."
                exit 0
              fi
            fi

            git rebase --abort || true
            sleep 2
          done

          echo "Push failed after 3 attempts."
          exit 1
